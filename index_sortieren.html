<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analog oder Digital?</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#2d7a1f;--green-dark:#1a5210;--analog-col:#c0392b;--analog-light:#fdf0ee;--digital-col:#1a6bbf;--digital-light:#eef4fd;--font:'Patrick Hand',cursive;--radius:14px}
body{font-family:var(--font);background:#f0f4ee;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;border-bottom:1.5px solid #dce8d6;flex-shrink:0;gap:12px}
#topbar h1{font-size:20px;color:var(--green)}
#score-display{font-size:17px;color:#555;display:flex;gap:18px}
.score-r{color:var(--green);font-weight:600}.score-f{color:#c0392b;font-weight:600}
#progress-wrap{flex:1;max-width:240px;height:10px;background:#e0e0e0;border-radius:6px;overflow:hidden}
#progress-bar{height:100%;background:var(--green);border-radius:6px;transition:width .4s;width:0%}
#restart-btn{padding:7px 16px;border:none;border-radius:9px;background:var(--green);color:#fff;font-size:15px;font-family:var(--font);cursor:pointer}
#restart-btn:hover{background:var(--green-dark)}
#arena{flex:1;display:flex;position:relative;overflow:hidden}
.zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:18px;position:relative;transition:filter .15s}
#zone-analog{background:var(--analog-light);border-right:3px solid #ddd}
#zone-digital{background:var(--digital-light)}
.zone.drag-over{filter:brightness(.93)}
.zone-title{font-size:28px;font-weight:700;z-index:1;pointer-events:none}
#zone-analog .zone-title{color:var(--analog-col)}
#zone-digital .zone-title{color:var(--digital-col)}
.zone-sub{font-size:14px;color:#aaa;z-index:1;pointer-events:none;margin-top:2px}
.zone-bg{font-size:72px;font-weight:700;opacity:.06;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#zone-analog .zone-bg{color:var(--analog-col)}
#zone-digital .zone-bg{color:var(--digital-col)}
.hint{position:absolute;bottom:20px;font-size:18px;color:#aaa;pointer-events:none}
#hint-left{left:12px}#hint-right{right:12px}
#divider{position:absolute;left:50%;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#ddd,#bbb 50%,#ddd);transform:translateX(-50%);z-index:5;pointer-events:none}
#divider-pip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:2px solid #ccc;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#bbb;text-align:center;line-height:1.2;z-index:6;pointer-events:none}
#card-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20}
#card{width:148px;height:170px;background:#fff;border-radius:var(--radius);box-shadow:0 6px 24px rgba(0,0,0,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;cursor:grab;border:2px solid #e0e8d8}
#card:active{cursor:grabbing}
#card.dragging{opacity:.88;box-shadow:0 14px 40px rgba(0,0,0,.28)}
#card img{width:96px;height:96px;object-fit:contain;pointer-events:none}
#card .card-word{font-size:16px;font-weight:600;color:#333;text-align:center;pointer-events:none}
#card-counter{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:13px;color:#999;white-space:nowrap}
.placed{position:fixed;width:58px;height:66px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:3px;animation:placeIn .25s cubic-bezier(.34,1.56,.64,1);border:2px solid;background:#fff;pointer-events:none}
.placed.correct{border-color:#6abf5e;background:#e8f5e3}
.placed.wrong{border-color:#e07070;background:#fdf0ee}
.placed img{width:36px;height:36px;object-fit:contain}
.placed .tick{font-size:11px;line-height:1}
@keyframes placeIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
#feedback{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;z-index:30;pointer-events:none;opacity:0}
#feedback.show{animation:feedPop .75s forwards}
@keyframes feedPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}65%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-65%) scale(1)}}
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200}
#win-box{background:#fff;border-radius:20px;padding:36px 48px;text-align:center;max-width:380px;width:90%;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
#win-emoji{font-size:56px;margin-bottom:8px}
#win-title{font-size:26px;font-weight:700;color:var(--green);margin-bottom:8px}
#win-score-display{font-size:19px;margin-bottom:6px}
#win-msg{font-size:15px;color:#888;margin-bottom:24px;line-height:1.5}
#win-again{padding:12px 30px;border:none;border-radius:var(--radius);background:var(--green);color:#fff;font-size:17px;font-family:var(--font);cursor:pointer}
#win-again:hover{background:var(--green-dark)}
</style>
</head>
<body>
<div id="topbar">
  <h1>🗂 Analog oder Digital?</h1>
  <div id="score-display"><span>✅ <span id="sc-right" class="score-r">0</span></span><span>❌ <span id="sc-wrong" class="score-f">0</span></span></div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <button id="restart-btn">↺ Neu starten</button>
</div>
<div id="arena">
  <div class="zone" id="zone-analog" ondragover="onDragOver(event,'analog')" ondragleave="onDragLeave('analog')" ondrop="onDrop(event,'analog')">
    <div class="zone-title">📻 Analog</div>
    <div class="zone-sub">hierher ziehen</div>
    <div class="zone-bg">Analog</div>
    <span class="hint" id="hint-left">← ziehen</span>
  </div>
  <div id="divider"><div id="divider-pip">oder?</div></div>
  <div class="zone" id="zone-digital" ondragover="onDragOver(event,'digital')" ondragleave="onDragLeave('digital')" ondrop="onDrop(event,'digital')">
    <div class="zone-title">💻 Digital</div>
    <div class="zone-sub">hierher ziehen</div>
    <div class="zone-bg">Digital</div>
    <span class="hint" id="hint-right">ziehen →</span>
  </div>
  <div id="card-wrap">
    <div id="card" draggable="true" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
      <span id="card-counter"></span>
      <img id="card-img" src="" alt="">
      <span class="card-word" id="card-word"></span>
    </div>
  </div>
  <div id="feedback"></div>
</div>
<div id="win-overlay">
  <div id="win-box">
    <div id="win-emoji">🎉</div>
    <div id="win-title">Geschafft!</div>
    <div id="win-score-display"></div>
    <div id="win-msg"></div>
    <button id="win-again">↺ Nochmal spielen</button>
  </div>
</div>

const TOTAL=16;
let queue=[],current=0,rightCount=0,wrongCount=0;
const placed={analog:[],digital:[]};
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function startGame(){
  queue=shuffle(ALL_ITEMS).slice(0,TOTAL);
  current=0;rightCount=0;wrongCount=0;placed.analog=[];placed.digital=[];
  document.querySelectorAll('.placed').forEach(e=>e.remove());
  updateScore();updateProgress();showCard();
  document.getElementById('win-overlay').style.display='none';
}
function showCard(){
  const item=queue[current];
  document.getElementById('card-img').src=item.img;
  document.getElementById('card-word').textContent=item.word;
  document.getElementById('card-counter').textContent=(current+1)+' / '+TOTAL;
}
function updateScore(){document.getElementById('sc-right').textContent=rightCount;document.getElementById('sc-wrong').textContent=wrongCount}
function updateProgress(){document.getElementById('progress-bar').style.width=(current/TOTAL*100)+'%'}
function onDragStart(e){document.getElementById('card').classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function onDragEnd(){document.getElementById('card').classList.remove('dragging');['analog','digital'].forEach(s=>document.getElementById('zone-'+s).classList.remove('drag-over'))}
function onDragOver(e,s){e.preventDefault();document.getElementById('zone-'+s).classList.add('drag-over')}
function onDragLeave(s){document.getElementById('zone-'+s).classList.remove('drag-over')}
function onDrop(e,s){e.preventDefault();document.getElementById('zone-'+s).classList.remove('drag-over');evaluate(s)}
let tx0=0,ty0=0,isDrag=false;
const cardEl=document.getElementById('card'),wrapEl=document.getElementById('card-wrap');
cardEl.addEventListener('touchstart',e=>{const t=e.touches[0];tx0=t.clientX;ty0=t.clientY;isDrag=false},{passive:true});
cardEl.addEventListener('touchmove',e=>{
  e.preventDefault();isDrag=true;
  const t=e.touches[0],dx=t.clientX-tx0,dy=t.clientY-ty0;
  wrapEl.style.left='calc(50% + '+dx+'px)';wrapEl.style.top='calc(50% + '+dy+'px)';
  const mid=window.innerWidth/2;
  document.getElementById('zone-analog').classList.toggle('drag-over',t.clientX<mid-50);
  document.getElementById('zone-digital').classList.toggle('drag-over',t.clientX>mid+50);
},{passive:false});
cardEl.addEventListener('touchend',e=>{
  ['analog','digital'].forEach(s=>document.getElementById('zone-'+s).classList.remove('drag-over'));
  wrapEl.style.left='50%';wrapEl.style.top='50%';
  if(!isDrag) return;
  const t=e.changedTouches[0],mid=window.innerWidth/2;
  if(t.clientX<mid-50) evaluate('analog');
  else if(t.clientX>mid+50) evaluate('digital');
});
function evaluate(chosen){
  const item=queue[current],ok=item.cat===chosen;
  if(ok) rightCount++; else wrongCount++;
  updateScore();showFeedback(ok?'✅':'❌');placeCard(item,chosen,ok);
  current++;updateProgress();
  if(current>=TOTAL) setTimeout(showWin,950);
  else setTimeout(showCard,620);
}
function showFeedback(em){const fb=document.getElementById('feedback');fb.textContent=em;fb.classList.remove('show');void fb.offsetWidth;fb.classList.add('show')}
function placeCard(item,zone,ok){
  const zEl=document.getElementById('zone-'+zone),r=zEl.getBoundingClientRect();
  const list=placed[zone],cols=Math.max(1,Math.floor((r.width-16)/64));
  const col=list.length%cols,row=Math.floor(list.length/cols);
  list.push(1);
  const el=document.createElement('div');
  el.className='placed '+(ok?'correct':'wrong');
  el.style.left=(r.left+8+col*64)+'px';el.style.top=(r.top+72+row*72)+'px';
  el.innerHTML='<img src="'+item.img+'" alt="'+item.word+'"><span class="tick">'+(ok?'✅':'❌')+'</span>';
  document.getElementById('arena').appendChild(el);
}
const LOBS=[['🏆','Klasse!','Du kennst den Unterschied perfekt!'],['🌟','Mega!','Analog und Digital – kein Problem!'],['🎊','Fantastisch!','Du bist ein echtes Medien-Genie!'],['⭐','Toll!','So viele richtige Antworten!']];
function showWin(){
  const l=LOBS[Math.floor(Math.random()*LOBS.length)],pct=Math.round(rightCount/TOTAL*100);
  document.getElementById('win-emoji').textContent=l[0];
  document.getElementById('win-title').textContent=l[1];
  document.getElementById('win-score-display').innerHTML='<span style="color:var(--green);font-weight:600">✅ '+rightCount+' richtig</span>&nbsp;&nbsp;<span style="color:#c0392b;font-weight:600">❌ '+wrongCount+' falsch</span>';
  document.getElementById('win-msg').textContent=pct===100?'Perfekte Runde – alle 16 richtig! '+l[2]:pct+'% richtig – '+l[2];
  document.getElementById('win-overlay').style.display='flex';
}
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('win-again').addEventListener('click',startGame);
startGame();
</script>
